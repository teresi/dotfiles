[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[profile.dev]
split-debuginfo = "unpacked" # faster build & smaller bins

[build]
# with incremental=true, we still get fast builds during development
# but sccache will mainly be useful when we cache:
# third party dependencies, dependencies between projects, artifacts after switching branches
incremental = true
rustc-wrapper = "sccache"
